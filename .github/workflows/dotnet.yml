name: Build Release

on:
  push:
    branches: [ "master" ]
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "WinFormsApp1/QA_Camera_Auto_Label.csproj"

      - name: Publish
        run: >
          dotnet publish "WinFormsApp1/QA_Camera_Auto_Label.csproj"
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Copy model files
        shell: pwsh
        run: |
          if (Test-Path "WinFormsApp1\Models") {
            New-Item -ItemType Directory -Force -Path "publish\Models" | Out-Null
            Copy-Item "WinFormsApp1\Models\*" "publish\Models" -Recurse -Force
          }

      - name: Zip output
        run: Compress-Archive -Path publish\* -DestinationPath app.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app.zip
